# PhotoMate 应用配置（开发机与 Jetson 共用同一份）

server:
  host: "0.0.0.0"
  port: 8000

robot:
  # g1 | s1；无真机时设 mock: true
  model: g1
  mock: true

map:
  # 3D 点云地图（优先）：Galbot 建图为 global_cloud_cleaned.pcd，也可放 MID-360 扫描结果
  point_cloud: data/maps/global_cloud.pcd
  z_min: 0.05
  z_max: 2.5
  auto_bounds: true
  # 俯视 PNG（次选）
  floor_plan: data/maps/floor_plan.png
  # auto_bounds=false 时用手动边界（米，map 系）
  bounds:
    xmin: -5.0
    ymin: -5.0
    xmax: 8.0
    ymax: 8.0
  resolution: 0.05

navigation:
  goal_timeout_sec: 60
  pose_poll_hz: 5

patrol:
  default_loop: true

perception:
  enabled: true
  loiter_threshold_sec: 3.0
  approach_distance_m: 2.5
  mock_signal_interval_sec: 25.0

agent:
  default_shoot_mode: phone
  default_spot_id: spot_a
