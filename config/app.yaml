# PhotoMate 应用配置（开发机与 Jetson 共用同一份）

server:
  host: "0.0.0.0"
  port: 8000

robot:
  # 真机：Galbot G1 @ galbot-echo（Orin HPU）
  model: g1
  display_name: "Galbot G1"
  hostname: galbot-echo
  # 真机联调设 false；开发机无机器人保持 true（或 export PHOTOMATE_MOCK=false）
  mock: false

map:
  # 3D 点云地图（优先）：Galbot 建图 global_cloud_cleaned.pcd
  # 真机源：/var/maps/room1102/（同步 scripts/sync_map_to_dashboard.sh）
  point_cloud: data/maps/global_cloud.pcd
  z_min: 0.05
  z_max: 2.5
  auto_bounds: true
  # 俯视 PNG（次选）
  floor_plan: data/maps/floor_plan.png
  # auto_bounds=false 时用手动边界（米，map 系）
  bounds:
    xmin: -5.0
    ymin: -5.0
    xmax: 8.0
    ymax: 8.0
  resolution: 0.05

navigation:
  goal_timeout_sec: 60
  pose_poll_hz: 5

patrol:
  default_loop: true

perception:
  enabled: true
  loiter_threshold_sec: 3.0
  approach_distance_m: 2.5
  mock_signal_interval_sec: 25.0

agent:
  default_shoot_mode: phone
  default_spot_id: spot_a

photo_agent:
  # mock | local-real | hardware-real (reserved)
  mode: mock
  model: qwen3.5-omni-flash-realtime
  voice: Tina
  workspace_host: llm-iscpge3ysktzaaf2.cn-beijing.maas.aliyuncs.com
  camera_index: 0
  # Insta360 Link 2 on macOS: raw frames are sideways; 270 = counter-clockwise
  # correction to upright. (90 made the preview upside-down.)
  camera_rotation_deg: 270
  # auto: prefer Mac built-in mic (input) and headphones (output)
  microphone_index: auto
  speaker_index: auto
  guidance_interval_s: 5.0
  skip_quality_check: true
  photo_dir: data/photos
  base_url: http://127.0.0.1:8000
  # 人物追踪由 Insta360 Link 2 固件级 AI 跟拍负责（相机自带），应用不再驱动云台。
