<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galbot SDK Documentation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .robot-selector {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1000px;
    }

    .robot-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      width: 350px;
    }

    .robot-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .robot-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
      background: #f5f5f5;
    }

    .robot-card h2 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 5px;
    }

    .robot-card .subtitle {
      color: #666;
      font-size: 1rem;
      margin-bottom: 25px;
    }

    .enter-button {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: opacity 0.3s ease;
    }

    .enter-button:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 50px;
      color: white;
      text-align: center;
      opacity: 0.8;
    }

    .footer a {
      color: white;
      text-decoration: underline;
      margin: 0 10px;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }

      .robot-card {
        width: 100%;
        max-width: 350px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Galbot SDK</h1>
    <p>Select your robot model to get started</p>
  </div>

  <div class="robot-selector">
    <div class="robot-card">
      <img src="image/g1.jpg" alt="G1" onerror="this.style.background='#e0e0e0'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.innerHTML='G1';">
      <h2>G1</h2>
      <p class="subtitle">Embodied Robot</p>
      <a href="g1/en/index.html" class="enter-button">Enter Documentation</a>
    </div>

    <div class="robot-card">
      <img src="image/s1.jpg" alt="S1" onerror="this.style.background='#e0e0e0'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.innerHTML='S1';">
      <h2>S1</h2>
      <p class="subtitle">Heavy-duty Robot</p>
      <a href="s1/en/index.html" class="enter-button">Enter Documentation</a>
    </div>
  </div>

  <div class="footer">
    <p>
      <a href="https://github.com/GalaxyGeneralRobotics">GitHub</a> |
      <a href="https://space.bilibili.com/3546595559737798">Bilibili</a>
    </p>
    <p style="margin-top: 10px;">© 2023-2026 Galbot. All rights reserved.</p>
  </div>
</body>
</html>
