<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoMate · 指挥台</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-inner">
      <span class="brand">PhotoMate</span>
      <nav class="top-links" aria-label="主导航">
        <a href="/" class="active">指挥台</a>
        <a href="/docs">文档</a>
      </nav>
      <div class="top-status" id="connStatus">连接中…</div>
    </div>
  </header>

  <div class="page-shell">
    <aside class="side-panel" aria-label="侧栏">
      <section class="panel">
        <h2>机器人状态</h2>
        <dl class="kv">
          <dt>模式</dt>
          <dd id="modeValue">—</dd>
          <dt>定位</dt>
          <dd id="localizedValue">—</dd>
          <dt>导航</dt>
          <dd id="navValue">—</dd>
          <dt>位姿 (map)</dt>
          <dd id="poseValue" class="mono">—</dd>
        </dl>
        <p class="hint" id="poseHint">—</p>
      </section>

      <section class="panel panel-grow">
        <h2>拍照航点</h2>
        <p class="hint">选择航点后发送到机器人。坐标来自 <code>config/waypoints.yaml</code>。</p>
        <ul class="spot-list" id="spotList"></ul>
        <div class="panel-actions">
          <button type="button" class="btn btn-danger" id="btnStop">停止导航</button>
        </div>
      </section>

      <section class="panel">
        <h2>任务日志</h2>
        <pre class="log" id="taskLog">等待连接…</pre>
      </section>
    </aside>

    <main class="main-panel">
      <section class="panel panel-map">
        <div class="map-head">
          <h2>会场地图</h2>
          <span class="map-meta" id="mapMeta">—</span>
        </div>
        <div class="map-wrap">
          <canvas id="mapCanvas" aria-label="地图与机器人位姿"></canvas>
        </div>
        <p class="hint map-foot" id="mapFoot">
          蓝点为机器人位置，线段为朝向。地图由点云 PCD 或平面图投影生成。
        </p>
      </section>
    </main>
  </div>

  <script src="/assets/js/map.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
